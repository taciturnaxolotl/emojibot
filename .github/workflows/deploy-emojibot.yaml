name: Deploy Emojibot

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-hackclub:
    uses: taciturnaxolotl/dots/.github/workflows/deploy-service.yml@main
    with:
      service: emojibot-hackclub
      health_url: https://hc.emojibot.dunkirk.sh/health?detailed=true
    secrets:
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}

  deploy-df1317:
    uses: taciturnaxolotl/dots/.github/workflows/deploy-service.yml@main
    with:
      service: emojibot-df1317
      health_url: https://df.emojibot.dunkirk.sh/health?detailed=true
    secrets:
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
